<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Click Game</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  margin-top: 80px;
}

h1 {
  color: #00ffcc;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  cursor: pointer;
  margin: 10px;
}

button:hover {
  background: #00c9a3;
}

.stats {
  margin: 20px;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

#mensaje {
  color: yellow;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">
  <h1>🔥 Click Game</h1>

  <div class="stats">
    <h2>Puntos: <span id="score">0</span></h2>
    <h2>Tiempo: <span id="time">10</span></h2>
  </div>

  <button onclick="jugar()">CLICK</button>
  <br>
  <button onclick="reiniciar()">Reiniciar</button>

  <p id="mensaje"></p>
  <p id="result"></p>
</div>

<script>
var score = 0;
var time = 10;
var started = false;
var timer;
var anuncioMostrado = false;

// FUNCIÓN PRINCIPAL
function jugar() {

  // 👉 mostrar anuncio SOLO una vez en el clic 3
  if (score === 2 && !anuncioMostrado) {
    anuncioMostrado = true;

    window.open("https://www.profitablecpmratenetwork.com/uh19svq6cq?key=240ed26038799c4d38acdf2b6773b452");

    document.getElementById("mensaje").innerText =
      "🔄 Vuelve al juego y sigue haciendo clic!";
  }

  if (!started) {
    started = true;

    timer = setInterval(function() {
      time--;
      document.getElementById("time").innerText = time;

      if (time === 0) {
        clearInterval(timer);
        document.getElementById("result").innerText =
          "🎯 Juego terminado. Tu puntuación fue: " + score;
      }
    }, 1000);
  }

  if (time > 0) {
    score++;
    document.getElementById("score").innerText = score;
  }
}

// REINICIAR
function reiniciar() {
  clearInterval(timer);
  score = 0;
  time = 10;
  started = false;
  anuncioMostrado = false;

  document.getElementById("score").innerText = 0;
  document.getElementById("time").innerText = 10;
  document.getElementById("result").innerText = "";
  document.getElementById("mensaje").innerText = "";
}
</script>

</body>
</html>
