<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juego</title>
</head>
<body>

<h1>Click Game</h1>
<button onclick="clickGame()">CLICK</button>
<p id="score">0</p>

<script>
var score = 0;

function clickGame() {
  score = score + 1;
  document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
