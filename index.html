<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Click Speed Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔥 Click Speed Game</h1>
    <p>Haz clic lo más rápido posible en 10 segundos</p>

    <div class="stats">
      <h2>Puntos: <span id="score">0</span></h2>
      <h2>Tiempo: <span id="time">10</span></h2>
    </div>

    <button id="btn">CLICK AQUÍ</button>

    <p id="result"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
